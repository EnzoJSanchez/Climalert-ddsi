rest-climalert:
  base-url: https://api.weatherapi.com/v1
  path: /current.json
  api-key: ${WEATHER_API_KEY}
  city: Buenos Aires


spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


